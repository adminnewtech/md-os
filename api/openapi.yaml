openapi: 3.1.0
info:
  title: MD-OS API
  version: 0.1.0
servers:
- url: https://paperclip.83-171-249-32.nip.io
paths:
  /api/health:
    get:
      summary: Health
      responses:
        '200':
          description: OK
  /api/companies:
    post:
      summary: Create company
      responses:
        '201':
          description: Created
    get:
      summary: List companies
      responses:
        '200':
          description: OK
  /api/projects:
    post:
      summary: Create project
      responses:
        '201':
          description: Created
    get:
      summary: List projects
      responses:
        '200':
          description: OK
  /api/agents:
    post:
      summary: Create agent
      responses:
        '201':
          description: Created
    get:
      summary: List agents
      responses:
        '200':
          description: OK
  /api/workflows:
    post:
      summary: Create workflow
      responses:
        '201':
          description: Created
    get:
      summary: List workflows
      responses:
        '200':
          description: OK
  /api/workflows/{id}/run:
    post:
      summary: Run workflow
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Accepted
  /api/tasks:
    post:
      summary: Create task
      responses:
        '201':
          description: Created
    get:
      summary: List tasks
      responses:
        '200':
          description: OK
  /api/approvals:
    post:
      summary: Request approval
      responses:
        '201':
          description: Created
    get:
      summary: List approvals
      responses:
        '200':
          description: OK
  /api/approvals/{id}/decide:
    post:
      summary: Approve/reject
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Decided
  /api/agent-runs:
    post:
      summary: Create agent run
      responses:
        '201':
          description: Created
    get:
      summary: List agent runs
      responses:
        '200':
          description: OK
  /api/agent-runs/{id}:
    get:
      summary: Get agent run
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
  /api/agent-runs/{id}/transition:
    post:
      summary: Transition agent run state
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_status]
              properties:
                to_status:
                  type: string
                  enum: [queued, running, waiting_approval, done, failed]
      responses:
        '200':
          description: Transitioned
        '409':
          description: Invalid transition
  /api/agent-runs/{id}/request-approval:
    post:
      summary: Pause agent run and create approval request
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category, title]
              properties:
                category:
                  type: string
                title:
                  type: string
                risk_level:
                  type: string
                  default: medium
                payload:
                  type: object
      responses:
        '201':
          description: Approval requested and agent run paused
        '409':
          description: Agent run cannot be interrupted
        '404':
          description: Agent run not found
  /api/orchestrator/cycles:
    post:
      summary: Create orchestrator cycle
      responses:
        '201':
          description: Created
    get:
      summary: List orchestrator cycles
      responses:
        '200':
          description: OK
  /api/orchestrator/cycles/{id}:
    get:
      summary: Get orchestrator cycle
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '404':
          description: Not found
  /api/orchestrator/cycles/{id}/run:
    post:
      summary: Run orchestrator cycle
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Executed
        '404':
          description: Not found
  /api/reports/agent-periodic:
    get:
      summary: Generate 6h agent periodic report
      responses:
        '200':
          description: Agent run status summary
  /api/reports/ceo-daily:
    get:
      summary: CEO daily synthesis report (Mon-Fri 9 AM)
      parameters:
      - name: period_start
        in: query
        schema:
          type: string
      - name: period_end
        in: query
        schema:
          type: string
      responses:
        '200':
          description: CEO daily summary with action items and insights
  /api/memory:
    post:
      summary: Write memory entry
      responses:
        '201':
          description: Created
    get:
      summary: List memory entries
      responses:
        '200':
          description: OK
  /api/memory/{id}:
    get:
      summary: Get memory entry
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Delete memory entry
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deleted
  /api/memory/search:
    post:
      summary: Search memory by vector similarity
      responses:
        '200':
          description: Results
  /api/crm/contacts:
    post:
      summary: Create CRM contact
      responses:
        '201':
          description: Created
    get:
      summary: List CRM contacts
      responses:
        '200':
          description: OK
  /api/crm/contacts/{id}:
    get:
      summary: Get CRM contact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
  /api/crm/leads:
    post:
      summary: Create CRM lead
      responses:
        '201':
          description: Created
    get:
      summary: List CRM leads
      responses:
        '200':
          description: OK
  /api/crm/leads/{id}:
    get:
      summary: Get CRM lead
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
  /api/crm/leads/{id}/convert:
    post:
      summary: Convert CRM lead to deal
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Converted
  /api/crm/deals:
    post:
      summary: Create CRM deal
      responses:
        '201':
          description: Created
    get:
      summary: List CRM deals
      responses:
        '200':
          description: OK
  /api/crm/deals/{id}:
    get:
      summary: Get CRM deal
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
  /api/crm/deals/{id}/stage:
    patch:
      summary: Update CRM deal stage
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: stage
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Updated
  /api/crm/deals/{id}/activities:
    post:
      summary: Create CRM deal activity
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Created
  /api/crm/pipeline:
    get:
      summary: CRM pipeline summary
      responses:
        '200':
          description: OK

  /api/support/tickets:
    post:
      summary: Create support ticket
      responses:
        '201':
          description: Created
    get:
      summary: List support tickets
      responses:
        '200':
          description: OK

  /api/support/tickets/{ticket_id}:
    get:
      summary: Get support ticket
      parameters:
      - name: ticket_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
    patch:
      summary: Update support ticket
      parameters:
      - name: ticket_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Updated

  /api/support/tickets/{ticket_id}/close:
    post:
      summary: Close support ticket
      parameters:
      - name: ticket_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Closed

  /api/support/tickets/{ticket_id}/notes:
    post:
      summary: Add support ticket note
      parameters:
      - name: ticket_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Created
    get:
      summary: List support ticket notes
      parameters:
      - name: ticket_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK

  /api/support/macros:
    post:
      summary: Create support macro
      responses:
        '201':
          description: Created
    get:
      summary: List support macros
      responses:
        '200':
          description: OK

  /api/support/macros/{macro_id}:
    get:
      summary: Get support macro
      parameters:
      - name: macro_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
    patch:
      summary: Update support macro
      parameters:
      - name: macro_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Updated

  /api/support/customer-health:
    post:
      summary: Upsert customer health
      responses:
        '200':
          description: OK

  /api/support/customer-health/{contact_id}:
    get:
      summary: Get customer health
      parameters:
      - name: contact_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK

  /api/support/summary:
    get:
      summary: Support summary
      responses:
        '200':
          description: OK
